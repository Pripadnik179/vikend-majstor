<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Prijava - VikendMajstor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 204, 0, 0.3);
      border-top-color: #FFCC00;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h2 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 10px;
    }
    p {
      color: #888;
      font-size: 14px;
    }
    .error {
      color: #ff6b6b;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <h2 id="message">Prijava u toku...</h2>
    <p id="submessage">Molimo sacekajte</p>
  </div>
  <script>
    (function() {
      console.log('[Google Callback] Page loaded');
      console.log('[Google Callback] Full URL:', window.location.href);
      console.log('[Google Callback] Hash:', window.location.hash);
      
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const accessToken = params.get('access_token');
      const error = params.get('error');
      const errorDescription = params.get('error_description');

      console.log('[Google Callback] accessToken exists:', !!accessToken, 'error:', error);

      if (accessToken) {
        document.getElementById('message').textContent = 'Uspesna prijava!';
        document.getElementById('submessage').textContent = 'Prozor ce se zatvoriti...';
        
        var messageSent = false;
        
        // Try postMessage first
        console.log('[Google Callback] Attempting postMessage, opener exists:', !!window.opener);
        if (window.opener && !window.opener.closed) {
          try {
            window.opener.postMessage({
              type: 'google-auth-success',
              accessToken: accessToken
            }, '*');
            console.log('[Google Callback] postMessage sent');
            messageSent = true;
          } catch (e) {
            console.error('[Google Callback] postMessage failed:', e);
          }
        }
        
        // Also save to localStorage as fallback
        try {
          localStorage.setItem('google_auth_token', accessToken);
          console.log('[Google Callback] Token saved to localStorage');
        } catch (e) {
          console.error('[Google Callback] localStorage failed:', e);
        }
        
        setTimeout(function() {
          window.close();
        }, 1500);
      } else if (error) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('message').textContent = 'Greska pri prijavi';
        document.getElementById('submessage').innerHTML = '<span class="error">' + (errorDescription || error) + '</span>';
        
        var errorMsg = errorDescription || error;
        
        if (window.opener && !window.opener.closed) {
          try {
            window.opener.postMessage({
              type: 'google-auth-error',
              error: errorMsg
            }, '*');
          } catch (e) {
            console.error('[Google Callback] postMessage error failed:', e);
          }
        }
        
        // Save error to localStorage as fallback
        try {
          localStorage.setItem('google_auth_error', errorMsg);
        } catch (e) {}
        
        setTimeout(function() {
          window.close();
        }, 3000);
      } else {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('message').textContent = 'Nema podataka';
        document.getElementById('submessage').textContent = 'Zatvorite ovaj prozor';
        console.log('[Google Callback] No token or error found in URL');
      }
    })();
  </script>
</body>
</html>
